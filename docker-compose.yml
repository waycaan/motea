version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: motea-postgres
    environment:
      POSTGRES_DB: motea
      POSTGRES_USER: motea
      POSTGRES_PASSWORD: motea
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  motea:
    image: ghcr.io/waycaan/motea:${TAG:-v3}
    container_name: motea
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
      - BASE_URL=http://localhost:3000
      - COOKIE_SECURE=false
      - DATABASE_URL=postgresql://motea:motea@postgres:5432/motea?sslmode=disable
      - PASSWORD=motea
      - PRELOAD_NOTES_COUNT=10
      - DISABLE_PASSWORD=false
    restart: unless-stopped
    depends_on:
      - postgres
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.8'
        reservations:
          memory: 256M
          cpus: '0.25'

volumes:
  postgres_data:
    driver: local
